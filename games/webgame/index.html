<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 竖屏版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        '2048-bg': '#faf8ef',
                        '2048-cell-empty': '#cdc1b4',
                        '2048-cell-2': '#eee4da',
                        '2048-cell-4': '#ede0c8',
                        '2048-cell-8': '#f2b179',
                        '2048-cell-16': '#f59563',
                        '2048-cell-32': '#f67c5f',
                        '2048-cell-64': '#f65e3b',
                        '2048-cell-128': '#edcf72',
                        '2048-cell-256': '#edcc61',
                        '2048-cell-512': '#edc850',
                        '2048-cell-1024': '#edc53f',
                        '2048-cell-2048': '#edc22e',
                        '2048-text-light': '#f9f6f2',
                        '2048-text-dark': '#776e65',
                    },
                    fontFamily: {
                        '2048': ['Clear Sans', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .game-container {
                aspect-ratio: 9/16;
            }
            .cell-transition {
                transition: all 0.2s ease;
            }
            .number-size {
                font-size: clamp(1.5rem, 5vw, 2.5rem);
            }
            .small-number {
                font-size: clamp(1rem, 3vw, 1.8rem);
            }
        }
    </style>
</head>

<body class="bg-2048-bg flex flex-col items-center justify-center min-h-screen p-4 font-2048">
    <!-- 游戏容器（9:16比例） -->
    <div class="game-container w-full max-w-md bg-2048-bg rounded-lg p-4 shadow-lg">
        <!-- 游戏头部 -->
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-[clamp(2rem,8vw,3rem)] font-bold text-2048-text-dark">2048</h1>
                <p class="text-sm text-2048-text-dark/80">合并方块，得到2048!</p>
            </div>
            <div class="flex gap-2">
                <div class="bg-2048-cell-empty rounded-md px-3 py-1 text-center">
                    <p class="text-xs text-2048-text-light/80">得分</p>
                    <p id="score" class="text-lg font-bold text-white">0</p>
                </div>
                <button id="restart-btn"
                    class="bg-2048-cell-empty hover:bg-opacity-80 text-white px-3 py-2 rounded-md transition-colors">
                    重新开始
                </button>
            </div>
        </div>

        <!-- 游戏提示 -->
        <p id="game-message" class="text-center text-lg font-medium text-2048-text-dark mb-4 hidden"></p>

        <!-- 游戏棋盘 -->
        <div id="game-board" class="grid grid-cols-4 gap-2 bg-[#bbada0] rounded-lg p-2 aspect-square w-full"></div>
    </div>

    <script>
        // 游戏核心变量
        const boardSize = 4;
        let gameBoard = [];
        let score = 0;
        let isGameOver = false;

        // DOM 元素
        const boardElement = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        const restartBtn = document.getElementById('restart-btn');
        const gameMessage = document.getElementById('game-message');

        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            gameBoard = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
            score = 0;
            isGameOver = false;
            scoreElement.textContent = score;
            gameMessage.classList.add('hidden');

            // 随机生成两个初始数字
            generateRandomCell();
            generateRandomCell();

            // 渲染棋盘
            renderBoard();
        }

        // 生成随机数字（2或4）
        function generateRandomCell() {
            // 找到所有空单元格
            const emptyCells = [];
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (gameBoard[i][j] === 0) {
                        emptyCells.push({ x: i, y: j });
                    }
                }
            }

            // 如果没有空单元格，返回
            if (emptyCells.length === 0) return;

            // 随机选择一个空单元格
            const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            // 90%概率生成2，10%概率生成4
            gameBoard[randomCell.x][randomCell.y] = Math.random() < 0.9 ? 2 : 4;
        }

        // 渲染游戏棋盘
        function renderBoard() {
            boardElement.innerHTML = '';

            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    const cellValue = gameBoard[i][j];
                    const cellElement = document.createElement('div');

                    // 设置单元格基础样式
                    cellElement.className = `cell-transition rounded-md flex items-center justify-center font-bold ${cellValue === 0
                        ? 'bg-2048-cell-empty'
                        : `bg-2048-cell-${Math.min(cellValue, 2048)}`
                        }`;

                    // 设置文字样式
                    if (cellValue !== 0) {
                        const textColor = cellValue <= 4 ? 'text-2048-text-dark' : 'text-2048-text-light';
                        const fontSize = cellValue >= 1024 ? 'small-number' : 'number-size';
                        cellElement.className += ` ${textColor} ${fontSize}`;
                        cellElement.textContent = cellValue;
                    }

                    boardElement.appendChild(cellElement);
                }
            }
        }

        // 处理键盘输入
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;

            let moved = false;
            switch (e.key) {
                case 'ArrowUp':
                    moved = moveUp();
                    break;
                case 'ArrowDown':
                    moved = moveDown();
                    break;
                case 'ArrowLeft':
                    moved = moveLeft();
                    break;
                case 'ArrowRight':
                    moved = moveRight();
                    break;
                default:
                    return;
            }

            // 如果有移动，生成新数字并检查游戏状态
            if (moved) {
                setTimeout(() => {
                    generateRandomCell();
                    renderBoard();
                    checkGameOver();
                }, 200);
            }
        });

        // 移动端触摸控制
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (isGameOver) return;

            touchEndX = e.changedTouches[0].clientX;
            touchEndY = e.changedTouches[0].clientY;

            // 计算滑动距离
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            let moved = false;

            // 判断滑动方向（优先垂直方向，适配竖屏）
            if (Math.abs(diffY) > Math.abs(diffX)) {
                if (diffY > 20) { // 向下滑动
                    moved = moveDown();
                } else if (diffY < -20) { // 向上滑动
                    moved = moveUp();
                }
            } else {
                if (diffX > 20) { // 向右滑动
                    moved = moveRight();
                } else if (diffX < -20) { // 向左滑动
                    moved = moveLeft();
                }
            }

            // 如果有移动，生成新数字并检查游戏状态
            if (moved) {
                setTimeout(() => {
                    generateRandomCell();
                    renderBoard();
                    checkGameOver();
                }, 200);
            }
        }, { passive: true });

        // 向上移动
        function moveUp() {
            let moved = false;

            for (let j = 0; j < boardSize; j++) {
                // 提取列数据
                const column = [];
                for (let i = 0; i < boardSize; i++) {
                    column.push(gameBoard[i][j]);
                }

                // 处理列数据（移动和合并）
                const newColumn = processLine(column);

                // 更新游戏棋盘
                for (let i = 0; i < boardSize; i++) {
                    if (gameBoard[i][j] !== newColumn[i]) {
                        moved = true;
                        gameBoard[i][j] = newColumn[i];
                    }
                }
            }

            return moved;
        }

        // 向下移动
        function moveDown() {
            let moved = false;

            for (let j = 0; j < boardSize; j++) {
                // 提取列数据并反转
                const column = [];
                for (let i = 0; i < boardSize; i++) {
                    column.push(gameBoard[i][j]);
                }
                const reversedColumn = column.reverse();

                // 处理列数据
                const newReversedColumn = processLine(reversedColumn);
                const newColumn = newReversedColumn.reverse();

                // 更新游戏棋盘
                for (let i = 0; i < boardSize; i++) {
                    if (gameBoard[i][j] !== newColumn[i]) {
                        moved = true;
                        gameBoard[i][j] = newColumn[i];
                    }
                }
            }

            return moved;
        }

        // 向左移动
        function moveLeft() {
            let moved = false;

            for (let i = 0; i < boardSize; i++) {
                // 提取行数据
                const row = gameBoard[i];

                // 处理行数据
                const newRow = processLine(row);

                // 更新游戏棋盘
                for (let j = 0; j < boardSize; j++) {
                    if (gameBoard[i][j] !== newRow[j]) {
                        moved = true;
                        gameBoard[i][j] = newRow[j];
                    }
                }
            }

            return moved;
        }

        // 向右移动
        function moveRight() {
            let moved = false;

            for (let i = 0; i < boardSize; i++) {
                // 提取行数据并反转
                const row = gameBoard[i];
                const reversedRow = row.reverse();

                // 处理行数据
                const newReversedRow = processLine(reversedRow);
                const newRow = newReversedRow.reverse();

                // 更新游戏棋盘
                for (let j = 0; j < boardSize; j++) {
                    if (gameBoard[i][j] !== newRow[j]) {
                        moved = true;
                        gameBoard[i][j] = newRow[j];
                    }
                }
            }

            return moved;
        }

        // 处理单行/列数据（移动和合并）
        function processLine(line) {
            // 移除所有0
            const filteredLine = line.filter(cell => cell !== 0);

            // 合并相同数字
            const mergedLine = [];
            let i = 0;
            while (i < filteredLine.length) {
                if (i + 1 < filteredLine.length && filteredLine[i] === filteredLine[i + 1]) {
                    // 合并数字
                    const mergedValue = filteredLine[i] * 2;
                    mergedLine.push(mergedValue);
                    // 更新得分
                    score += mergedValue;
                    scoreElement.textContent = score;
                    i += 2;
                } else {
                    mergedLine.push(filteredLine[i]);
                    i += 1;
                }
            }

            // 补0到原长度
            while (mergedLine.length < boardSize) {
                mergedLine.push(0);
            }

            return mergedLine;
        }

        // 检查游戏是否结束
        function checkGameOver() {
            // 检查是否有空单元格
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (gameBoard[i][j] === 0) {
                        return; // 还有空单元格，游戏继续
                    }
                }
            }

            // 检查是否有可合并的单元格
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    const current = gameBoard[i][j];
                    // 检查右侧单元格
                    if (j < boardSize - 1 && gameBoard[i][j + 1] === current) {
                        return; // 还有可合并的单元格
                    }
                    // 检查下方单元格
                    if (i < boardSize - 1 && gameBoard[i + 1][j] === current) {
                        return; // 还有可合并的单元格
                    }
                }
            }

            // 游戏结束
            isGameOver = true;
            gameMessage.textContent = `游戏结束！最终得分：${score}`;
            gameMessage.classList.remove('hidden');
        }

        // 重新开始游戏
        restartBtn.addEventListener('click', initGame);

        // 初始化游戏
        window.addEventListener('load', initGame);
    </script>
</body>

</html>
